<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geotessera Viewer</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'] },
          colors: { term: { green: '#39ff14', cyan: '#00e5ff', dim: '#6b7280' } }
        }
      }
    };
  </script>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- proj4 -->
  <script src="https://unpkg.com/proj4@2.12.1/dist/proj4.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #map { position: absolute; inset: 0; }

    /* Dark scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Range input styling */
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-track { height: 3px; background: #1f2937; border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      margin-top: -4.5px; border: 1.5px solid #111; box-shadow: 0 0 4px rgba(0,229,255,0.3);
    }
    input[type=range].band-r::-webkit-slider-thumb { background: #ef4444; }
    input[type=range].band-g::-webkit-slider-thumb { background: #22c55e; }
    input[type=range].band-b::-webkit-slider-thumb { background: #3b82f6; }
    input[type=range].ctl-cyan::-webkit-slider-thumb { background: #00e5ff; }

    /* Pulse glow */
    @keyframes pulse-glow { 0%,100%{opacity:.4} 50%{opacity:1} }
    .loading-glow { animation: pulse-glow 1.5s ease-in-out infinite; }

    /* Scanline overlay for hacker vibes (subtle) */
    #controls::after {
      content: ''; pointer-events: none; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px);
      border-radius: inherit;
    }
  </style>
</head>

<body class="font-mono text-gray-300 text-xs">
  <!-- Map -->
  <div id="map"></div>

  <!-- Control panel -->
  <div id="controls" class="absolute top-4 right-4 w-[280px] bg-black/85 backdrop-blur-xl
                             border border-gray-800/80 rounded-lg shadow-2xl shadow-cyan-900/20
                             overflow-hidden select-none z-10 relative">
    <!-- Header -->
    <div class="px-4 py-3 border-b border-gray-800/60">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-term-cyan shadow-[0_0_6px_rgba(0,229,255,0.6)]"></div>
        <h1 class="text-term-cyan text-sm font-bold tracking-[0.2em] uppercase">Geotessera</h1>
      </div>
      <p class="text-gray-600 text-[10px] mt-0.5 tracking-wider">ZARR EMBEDDING VIEWER</p>
    </div>

    <!-- Store selector -->
    <div class="px-4 py-3 border-b border-gray-800/60">
      <label class="text-gray-500 text-[10px] uppercase tracking-[0.15em]">Store</label>
      <div class="flex gap-1.5 mt-1.5">
        <select id="store-select"
                class="flex-1 bg-gray-950 border border-gray-700/60 rounded px-2 py-1.5
                       text-gray-300 text-[11px] focus:border-term-cyan/60 focus:outline-none
                       focus:shadow-[0_0_8px_rgba(0,229,255,0.15)] transition-all
                       appearance-none cursor-pointer"
                style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%2266707a%22 stroke-width=%222%22><polyline points=%226 9 12 15 18 9%22/></svg>'); background-repeat: no-repeat; background-position: right 6px center;">
          <option value="" disabled selected>Discovering stores...</option>
        </select>
        <button id="load-btn"
                class="bg-term-cyan/90 hover:bg-term-cyan text-black font-bold text-[10px]
                       px-3 py-1.5 rounded tracking-wider transition-all
                       hover:shadow-[0_0_12px_rgba(0,229,255,0.4)] active:scale-95">
          LOAD
        </button>
      </div>
      <!-- Manual URL fallback (collapsed by default) -->
      <details class="mt-1.5">
        <summary class="text-[10px] text-gray-600 cursor-pointer hover:text-gray-400 transition-colors">
          Manual URL
        </summary>
        <input id="store-url" type="text"
               class="mt-1 w-full bg-gray-950 border border-gray-700/60 rounded px-2 py-1.5
                      text-gray-300 text-[11px] focus:border-term-cyan/60 focus:outline-none
                      focus:shadow-[0_0_8px_rgba(0,229,255,0.15)] transition-all
                      placeholder-gray-700"
               placeholder="http://host:port/utm33_2024.zarr">
      </details>
      <div id="status" class="mt-1.5 text-[10px] text-gray-600 truncate">Ready</div>
    </div>

    <!-- Band selection -->
    <div id="band-panel" class="px-4 py-3 border-b border-gray-800/60 opacity-40 pointer-events-none transition-opacity">
      <label class="text-gray-500 text-[10px] uppercase tracking-[0.15em]">Band Mapping</label>
      <div class="mt-2 space-y-2">
        <div class="flex items-center gap-2">
          <span class="w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold
                       bg-red-500/20 text-red-400 border border-red-500/30">R</span>
          <input id="band-r" type="range" min="0" max="127" value="0"
                 class="flex-1 h-1 band-r">
          <span id="band-r-val" class="w-6 text-right text-red-400 tabular-nums">0</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold
                       bg-green-500/20 text-green-400 border border-green-500/30">G</span>
          <input id="band-g" type="range" min="0" max="127" value="1"
                 class="flex-1 h-1 band-g">
          <span id="band-g-val" class="w-6 text-right text-green-400 tabular-nums">1</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold
                       bg-blue-500/20 text-blue-400 border border-blue-500/30">B</span>
          <input id="band-b" type="range" min="0" max="127" value="2"
                 class="flex-1 h-1 band-b">
          <span id="band-b-val" class="w-6 text-right text-blue-400 tabular-nums">2</span>
        </div>
      </div>
    </div>

    <!-- Opacity -->
    <div id="opacity-panel" class="px-4 py-3 border-b border-gray-800/60 opacity-40 pointer-events-none transition-opacity">
      <div class="flex items-center justify-between">
        <label class="text-gray-500 text-[10px] uppercase tracking-[0.15em]">Opacity</label>
        <span id="opacity-val" class="text-term-cyan/70 tabular-nums">0.80</span>
      </div>
      <div class="mt-1.5">
        <input id="opacity" type="range" min="0" max="100" value="80"
               class="w-full h-1 ctl-cyan">
      </div>
    </div>

    <!-- Overlays -->
    <div id="overlay-panel" class="px-4 py-3 border-b border-gray-800/60 opacity-40 pointer-events-none transition-opacity">
      <label class="text-gray-500 text-[10px] uppercase tracking-[0.15em]">Overlays</label>
      <div class="mt-2 space-y-1.5">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input id="toggle-grid" type="checkbox" checked
                 class="w-3 h-3 rounded accent-[#00e5ff] bg-gray-950 border-gray-700">
          <span class="text-[11px] group-hover:text-term-cyan transition-colors">Chunk grid</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
          <input id="toggle-utm" type="checkbox" checked
                 class="w-3 h-3 rounded accent-[#39ff14] bg-gray-950 border-gray-700">
          <span class="text-[11px] group-hover:text-term-green transition-colors">UTM zone</span>
        </label>
      </div>
    </div>

    <!-- Info panel -->
    <div id="info-panel" class="px-4 py-3 text-[10px] space-y-1 hidden">
      <div class="flex justify-between"><span class="text-gray-600">Zone</span><span id="info-zone" class="text-gray-400">--</span></div>
      <div class="flex justify-between"><span class="text-gray-600">EPSG</span><span id="info-epsg" class="text-gray-400">--</span></div>
      <div class="flex justify-between"><span class="text-gray-600">Grid</span><span id="info-grid" class="text-gray-400">--</span></div>
      <div class="flex justify-between"><span class="text-gray-600">Chunks</span><span id="info-chunks" class="text-term-cyan/60 tabular-nums">--</span></div>
      <div class="flex justify-between"><span class="text-gray-600">Status</span><span id="info-status" class="text-gray-400">--</span></div>
    </div>
  </div>

  <!-- Coordinates -->
  <div id="coords" class="absolute bottom-2 left-2 bg-black/70 backdrop-blur-sm
                           text-[10px] text-gray-500 font-mono px-2.5 py-1 rounded
                           border border-gray-800/40 z-10 tabular-nums">
    <span id="coord-text">--</span>
  </div>

  <!-- Loading overlay (per-chunk) -->
  <div id="chunk-loading" class="hidden absolute bottom-2 right-4
                                  bg-black/80 backdrop-blur-sm border border-term-cyan/20
                                  rounded px-3 py-1.5 text-term-cyan text-[10px]
                                  loading-glow z-10">
    <span id="chunk-loading-text">Loading chunk...</span>
  </div>

  <!-- Progress bar -->
  <div id="progress-bar" style="display:none; position:fixed; bottom:0; left:0; right:0; height:4px; background:#333; z-index:10;">
    <div id="progress-fill" style="height:100%; width:0%; background:#4fc3f7; transition:width 0.15s;"></div>
  </div>

  <!-- ============================================================ -->
  <!-- Main application script                                       -->
  <!-- ============================================================ -->
  <script type="module">

  // ─── WebWorker pool (fzstd loaded inside workers) ────────────────────────────────────────────

  const FZSTD_CDN_PRIMARY   = 'https://cdn.jsdelivr.net/npm/fzstd@0.1.1/+esm';
  const FZSTD_CDN_FALLBACK  = 'https://esm.sh/fzstd@0.1.1';

  const workerCode = `
    let fzstdDecompress = null;

    self.onmessage = async function(e) {
      const msg = e.data;

      if (msg.type === 'init') {
        // Load fzstd inside the worker via dynamic import
        try {
          const m = await import(msg.fzstdUrl);
          fzstdDecompress = m.decompress || m.default?.decompress;
        } catch {
          try {
            const m = await import(msg.fzstdFallback);
            fzstdDecompress = m.decompress || m.default?.decompress;
          } catch (err) {
            self.postMessage({ type: 'error', error: 'Failed to load fzstd: ' + err.message });
            return;
          }
        }
        self.postMessage({ type: 'ready' });
        return;
      }

      if (msg.type === 'decompress-and-render-rgb') {
        const { compressedRgb, width, height, strideCol, id } = msg;
        const rgbRaw = fzstdDecompress(new Uint8Array(compressedRgb));
        const rgba = new Uint8Array(width * height * 4);
        let nValid = 0;
        for (let r = 0; r < height; r++) {
          for (let c = 0; c < width; c++) {
            const pi = (r * width + c) * 4;
            const si = (r * strideCol + c) * 4;
            rgba[pi]     = rgbRaw[si];
            rgba[pi + 1] = rgbRaw[si + 1];
            rgba[pi + 2] = rgbRaw[si + 2];
            rgba[pi + 3] = rgbRaw[si + 3];
            if (rgbRaw[si + 3] > 0) nValid++;
          }
        }
        self.postMessage(
          { type: 'rgb-result', id, rgba: rgba.buffer, width, height, nValid },
          [rgba.buffer]
        );
        return;
      }

      if (msg.type === 'decompress-and-render-emb') {
        const { compressedEmb, compressedScales, width, height, strideCol, nBands, bands, id } = msg;
        const embRaw = fzstdDecompress(new Uint8Array(compressedEmb));
        const scalesRaw = fzstdDecompress(new Uint8Array(compressedScales));

        // Render bands to RGBA
        const result = renderBands(embRaw, scalesRaw, width, height, strideCol, nBands, bands);
        self.postMessage(
          { type: 'emb-result', id, rgba: result.rgba.buffer, width, height, nValid: result.nValid,
            embRaw: embRaw.buffer, scalesRaw: scalesRaw.buffer },
          [result.rgba.buffer, embRaw.buffer, scalesRaw.buffer]
        );
        return;
      }

      if (msg.type === 'render-emb') {
        // Re-render cached (already decompressed) data with new bands
        const { embRaw, scalesRaw, width, height, strideCol, nBands, bands, id } = msg;
        const embBytes = new Uint8Array(embRaw);
        const scalesBytes = new Uint8Array(scalesRaw);
        const result = renderBands(embBytes, scalesBytes, width, height, strideCol, nBands, bands);
        self.postMessage(
          { type: 'emb-result', id, rgba: result.rgba.buffer, width, height, nValid: result.nValid,
            embRaw: embRaw, scalesRaw: scalesRaw },
          [result.rgba.buffer]
        );
        return;
      }
    };

    function renderBands(embRaw, scalesRaw, w, h, strideCol, nBands, bands) {
      const embInt8 = new Int8Array(embRaw.buffer, embRaw.byteOffset, embRaw.byteLength);
      const scalesBuf = new ArrayBuffer(scalesRaw.byteLength);
      new Uint8Array(scalesBuf).set(scalesRaw);
      const scalesF32 = new Float32Array(scalesBuf);

      const [bR, bG, bB] = bands;
      let minR = 127, maxR = -128, minG = 127, maxG = -128, minB = 127, maxB = -128;
      let nValid = 0;

      for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
          const si = r * strideCol + c;
          if (isNaN(scalesF32[si]) || scalesF32[si] === 0) continue;
          const base = (r * strideCol + c) * nBands;
          const vr = embInt8[base + bR];
          const vg = embInt8[base + bG];
          const vb = embInt8[base + bB];
          if (vr < minR) minR = vr; if (vr > maxR) maxR = vr;
          if (vg < minG) minG = vg; if (vg > maxG) maxG = vg;
          if (vb < minB) minB = vb; if (vb > maxB) maxB = vb;
          nValid++;
        }
      }

      const rgba = new Uint8Array(w * h * 4);
      if (nValid === 0 || (maxR === minR && maxG === minG && maxB === minB)) {
        return { rgba, nValid: 0 };
      }

      const rangeR = maxR - minR || 1;
      const rangeG = maxG - minG || 1;
      const rangeB = maxB - minB || 1;

      for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
          const pi = (r * w + c) * 4;
          const si = r * strideCol + c;
          const scale = scalesF32[si];
          if (isNaN(scale) || scale === 0) { rgba[pi + 3] = 0; continue; }
          const base = (r * strideCol + c) * nBands;
          rgba[pi]     = Math.max(0, Math.min(255, ((embInt8[base + bR] - minR) / rangeR) * 255));
          rgba[pi + 1] = Math.max(0, Math.min(255, ((embInt8[base + bG] - minG) / rangeG) * 255));
          rgba[pi + 2] = Math.max(0, Math.min(255, ((embInt8[base + bB] - minB) / rangeB) * 255));
          rgba[pi + 3] = 255;
        }
      }
      return { rgba, nValid };
    }
  `;

  const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
  const workerUrl = URL.createObjectURL(workerBlob);

  class WorkerPool {
    constructor(size) {
      this.size = size;
      this.workers = [];
      this.queue = [];        // pending tasks
      this.idle = [];          // indices of idle workers
      this.resolvers = new Map();  // msgId → { resolve }
      this.nextId = 0;
      this.readyCount = 0;
      this.readyPromise = new Promise(res => { this._readyResolve = res; });

      for (let i = 0; i < size; i++) {
        const w = new Worker(workerUrl, { type: 'module' });
        w.onmessage = (e) => this._onMessage(i, e);
        w.postMessage({ type: 'init', fzstdUrl: FZSTD_CDN_PRIMARY, fzstdFallback: FZSTD_CDN_FALLBACK });
        this.workers.push(w);
      }
    }

    _onMessage(workerIdx, e) {
      const msg = e.data;
      if (msg.type === 'ready') {
        this.readyCount++;
        this.idle.push(workerIdx);
        if (this.readyCount === this.size) this._readyResolve();
        this._drain();
        return;
      }
      if (msg.type === 'error') { console.error('[worker]', msg.error); return; }
      const resolver = this.resolvers.get(msg.id);
      if (resolver) {
        this.resolvers.delete(msg.id);
        resolver.resolve(msg);
      }
      this.idle.push(workerIdx);
      this._drain();
    }

    _drain() {
      while (this.idle.length > 0 && this.queue.length > 0) {
        const workerIdx = this.idle.shift();
        const { msg, transfers, resolve } = this.queue.shift();
        const id = this.nextId++;
        msg.id = id;
        this.resolvers.set(id, { resolve });
        this.workers[workerIdx].postMessage(msg, transfers);
      }
    }

    async dispatch(msg, transfers = []) {
      await this.readyPromise;
      return new Promise(resolve => {
        if (this.idle.length > 0) {
          const workerIdx = this.idle.shift();
          const id = this.nextId++;
          msg.id = id;
          this.resolvers.set(id, { resolve });
          this.workers[workerIdx].postMessage(msg, transfers);
        } else {
          this.queue.push({ msg, transfers, resolve });
        }
      });
    }

    terminateAll() {
      for (const w of this.workers) w.terminate();
      this.workers = [];
      this.idle = [];
      this.queue = [];
      this.resolvers.clear();
    }
  }

  const WORKER_COUNT = Math.min(navigator.hardwareConcurrency || 4, 8);
  const workerPool = new WorkerPool(WORKER_COUNT);

  // ─── State ─────────────────────────────────────────────────────
  let map;
  let store = null;           // { url, groupMeta, embMeta, scalesMeta, utmZone, epsg, transform, shape, chunkShape, chunkManifest }
  const chunkCache = new Map();  // "ci_cj" -> { embRaw, scalesRaw, canvas, sourceId, layerId, isPreview }
  let bands = [0, 1, 2];
  let opacity = 0.80;
  let loadingChunks = 0;
  let totalLoaded = 0;
  let currentAbort = null;     // AbortController — cancelled on each viewport update
  let autoZoomNext = true;     // zoom to first successfully rendered chunk

  // RGB preview state
  let hasRgbPreview = false;    // true if current store has an rgb array
  let rgbMeta = null;           // metadata for the rgb array
  const clickedChunks = new Set();  // chunk keys where user has clicked for full-band data

  const MAX_CACHED = 50;
  const MAX_LOAD_PER_UPDATE = 80;  // cap chunks loaded per viewport change

  // ─── DOM refs ──────────────────────────────────────────────────
  const $storeSelect = document.getElementById('store-select');
  const $storeUrl    = document.getElementById('store-url');
  const $loadBtn     = document.getElementById('load-btn');
  const $status      = document.getElementById('status');
  const $bandPanel   = document.getElementById('band-panel');
  const $opacityPanel = document.getElementById('opacity-panel');
  const $bandR       = document.getElementById('band-r');
  const $bandG       = document.getElementById('band-g');
  const $bandB       = document.getElementById('band-b');
  const $bandRVal    = document.getElementById('band-r-val');
  const $bandGVal    = document.getElementById('band-g-val');
  const $bandBVal    = document.getElementById('band-b-val');
  const $opacity     = document.getElementById('opacity');
  const $opacityVal  = document.getElementById('opacity-val');
  const $infoPanel   = document.getElementById('info-panel');
  const $infoZone    = document.getElementById('info-zone');
  const $infoEpsg    = document.getElementById('info-epsg');
  const $infoGrid    = document.getElementById('info-grid');
  const $infoChunks  = document.getElementById('info-chunks');
  const $infoStatus  = document.getElementById('info-status');
  const $coordText   = document.getElementById('coord-text');
  const $chunkLoading     = document.getElementById('chunk-loading');
  const $chunkLoadingText = document.getElementById('chunk-loading-text');
  const $overlayPanel     = document.getElementById('overlay-panel');
  const $toggleGrid       = document.getElementById('toggle-grid');
  const $toggleUtm        = document.getElementById('toggle-utm');
  const $progressBar      = document.getElementById('progress-bar');
  const $progressFill     = document.getElementById('progress-fill');

  // ─── Progress tracker ─────────────────────────────────────────

  const progressTracker = {
    total: 0, done: 0,
    reset() { this.total = 0; this.done = 0; $progressBar.style.display = 'none'; $progressFill.style.width = '0%'; },
    start(total) { this.total = total; this.done = 0; if (total > 0) { $progressBar.style.display = 'block'; $progressFill.style.width = '0%'; } },
    tick() {
      this.done++;
      const pct = this.total > 0 ? (this.done / this.total * 100) : 100;
      $progressFill.style.width = pct + '%';
      if (this.done >= this.total) setTimeout(() => { $progressBar.style.display = 'none'; }, 400);
    },
  };

  // ─── Zarr v3 reader ───────────────────────────────────────────

  async function fetchJSON(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${url}`);
    return resp.json();
  }

  async function fetchBytes(url, signal) {
    const resp = await fetch(url, signal ? { signal } : undefined);
    if (!resp.ok) return null;  // chunk might not exist
    return new Uint8Array(await resp.arrayBuffer());
  }

  async function readStoreMeta(baseUrl) {
    const meta = await fetchJSON(`${baseUrl}/zarr.json`);
    return meta.attributes || {};
  }

  async function readArrayMeta(baseUrl, name) {
    const meta = await fetchJSON(`${baseUrl}/${name}/zarr.json`);
    const shape = meta.shape;
    const chunkShape = meta.chunk_grid?.configuration?.chunk_shape;
    // Find zstd in codecs
    const hasZstd = (meta.codecs || []).some(c => c.name === 'zstd');
    const dtype = typeof meta.data_type === 'string' ? meta.data_type : meta.data_type?.name;
    const fillValue = meta.fill_value;
    return { shape, chunkShape, hasZstd, dtype, fillValue };
  }

  async function fetchCompressedChunk(baseUrl, arrayName, indices, signal) {
    const key = indices.join('/');
    const url = `${baseUrl}/${arrayName}/c/${key}`;
    return await fetchBytes(url, signal);
  }

  // ─── Projection ───────────────────────────────────────────────

  let projForward, projInverse;

  function setupProjection(utmZone, isSouth) {
    const proj4Def = `+proj=utm +zone=${utmZone}${isSouth ? ' +south' : ''} +datum=WGS84 +units=m +no_defs`;
    proj4.defs(`UTM_ZONE`, proj4Def);
    projForward = (lng, lat) => proj4('EPSG:4326', 'UTM_ZONE', [lng, lat]);
    projInverse = (e, n) => proj4('UTM_ZONE', 'EPSG:4326', [e, n]);
  }

  function utmToLngLat(easting, northing) {
    return projInverse(easting, northing);  // returns [lng, lat]
  }

  // ─── Chunk geometry ───────────────────────────────────────────

  function getChunkPixelBounds(ci, cj) {
    const cs = store.chunkShape;
    const s = store.shape;
    const r0 = ci * cs[0];
    const r1 = Math.min(r0 + cs[0], s[0]);
    const c0 = cj * cs[1];
    const c1 = Math.min(c0 + cs[1], s[1]);
    return { r0, r1, c0, c1 };
  }

  function getChunkUtmBounds(ci, cj) {
    const { r0, r1, c0, c1 } = getChunkPixelBounds(ci, cj);
    const t = store.transform; // [pixel_size, 0, origin_e, 0, -pixel_size, origin_n]
    const px = t[0];
    const originE = t[2];
    const originN = t[5];
    return {
      minE: originE + c0 * px,
      maxE: originE + c1 * px,
      minN: originN - r1 * px,  // bottom (lower northing)
      maxN: originN - r0 * px,  // top (higher northing)
    };
  }

  function getChunkLngLatCorners(ci, cj) {
    const b = getChunkUtmBounds(ci, cj);
    // MapLibre image source wants: [TL, TR, BR, BL] as [lng, lat]
    const tl = utmToLngLat(b.minE, b.maxN);
    const tr = utmToLngLat(b.maxE, b.maxN);
    const br = utmToLngLat(b.maxE, b.minN);
    const bl = utmToLngLat(b.minE, b.minN);
    return [tl, tr, br, bl];
  }

  // ─── Visible chunk computation ────────────────────────────────

  function getVisibleChunkIndices() {
    if (!store) return [];
    const bounds = map.getBounds();
    const sw = projForward(bounds.getWest(), bounds.getSouth());
    const ne = projForward(bounds.getEast(), bounds.getNorth());
    // Also project NW and SE for better coverage with UTM skew
    const nw = projForward(bounds.getWest(), bounds.getNorth());
    const se = projForward(bounds.getEast(), bounds.getSouth());

    const minE = Math.min(sw[0], nw[0]) - 1000;
    const maxE = Math.max(ne[0], se[0]) + 1000;
    const minN = Math.min(sw[1], se[1]) - 1000;
    const maxN = Math.max(ne[1], nw[1]) + 1000;

    const cs = store.chunkShape;
    const s = store.shape;
    const t = store.transform;
    const px = t[0];
    const originE = t[2];
    const originN = t[5];

    const nChunksRow = Math.ceil(s[0] / cs[0]);
    const nChunksCol = Math.ceil(s[1] / cs[1]);

    // Convert UTM bounds to chunk indices
    const cjMin = Math.max(0, Math.floor((minE - originE) / (cs[1] * px)));
    const cjMax = Math.min(nChunksCol - 1, Math.floor((maxE - originE) / (cs[1] * px)));
    const ciMin = Math.max(0, Math.floor((originN - maxN) / (cs[0] * px)));
    const ciMax = Math.min(nChunksRow - 1, Math.floor((originN - minN) / (cs[0] * px)));

    const result = [];
    for (let ci = ciMin; ci <= ciMax; ci++) {
      for (let cj = cjMin; cj <= cjMax; cj++) {
        // Skip chunks not in manifest (sparse stores don't have all grid positions)
        if (store.chunkManifest && !store.chunkManifest.has(`${ci}_${cj}`)) continue;
        result.push([ci, cj]);
      }
    }
    return result;
  }

  // ─── Map integration ──────────────────────────────────────────

  function chunkKey(ci, cj) { return `${ci}_${cj}`; }

  function addChunkToMap(ci, cj, canvas) {
    const key = chunkKey(ci, cj);
    const sourceId = `chunk-src-${key}`;
    const layerId = `chunk-lyr-${key}`;
    const corners = getChunkLngLatCorners(ci, cj);

    // Convert canvas to data URL
    const dataUrl = canvas.toDataURL('image/png');

    if (map.getLayer(layerId)) map.removeLayer(layerId);
    if (map.getSource(sourceId)) map.removeSource(sourceId);

    map.addSource(sourceId, {
      type: 'image',
      url: dataUrl,
      coordinates: corners,
    });

    // Add raster layer on top, then move overlay lines above it
    map.addLayer({
      id: layerId,
      type: 'raster',
      source: sourceId,
      paint: {
        'raster-opacity': opacity,
        'raster-fade-duration': 0,
      },
    });

    // Keep grid lines and UTM outline on top of all raster chunks
    if (map.getLayer('chunk-grid-lines')) map.moveLayer('chunk-grid-lines');
    if (map.getLayer('utm-zone-line')) map.moveLayer('utm-zone-line');

    return { sourceId, layerId };
  }

  function removeChunkFromMap(key) {
    const entry = chunkCache.get(key);
    if (!entry) return;
    try {
      if (entry.layerId && map.getLayer(entry.layerId)) map.removeLayer(entry.layerId);
      if (entry.sourceId && map.getSource(entry.sourceId)) map.removeSource(entry.sourceId);
    } catch { /* ignore */ }
    entry.sourceId = null;
    entry.layerId = null;
  }

  function findFirstLabelLayer() {
    const layers = map.getStyle().layers;
    for (const layer of layers) {
      if (layer.type === 'symbol' && (layer.layout?.['text-field'] || layer.id.includes('label'))) {
        return layer.id;
      }
    }
    return undefined;
  }

  // ─── Overlays ───────────────────────────────────────────────

  const OVERLAY_LAYERS = [
    'chunk-grid-nodata', 'chunk-grid-data', 'chunk-grid-lines',
    'utm-zone-fill', 'utm-zone-line',
  ];

  function removeOverlays() {
    for (const id of OVERLAY_LAYERS) {
      if (map.getLayer(id)) map.removeLayer(id);
    }
    if (map.getSource('utm-zone')) map.removeSource('utm-zone');
    if (map.getSource('chunk-grid')) map.removeSource('chunk-grid');
  }

  function addOverlays() {
    if (!store) return;
    removeOverlays();

    const labelLayer = findFirstLabelLayer();

    // === UTM Zone boundary ===
    const zone = store.utmZone;
    const isSouth = store.epsg >= 32700 && store.epsg <= 32760;
    const lonMin = (zone - 1) * 6 - 180;
    const lonMax = zone * 6 - 180;
    const latMin = isSouth ? -80 : 0;
    const latMax = isSouth ? 0 : 84;

    map.addSource('utm-zone', {
      type: 'geojson',
      data: {
        type: 'Feature',
        properties: {},
        geometry: {
          type: 'Polygon',
          coordinates: [[[lonMin, latMin], [lonMax, latMin], [lonMax, latMax], [lonMin, latMax], [lonMin, latMin]]]
        }
      }
    });

    map.addLayer({
      id: 'utm-zone-fill',
      type: 'fill',
      source: 'utm-zone',
      paint: { 'fill-color': '#39ff14', 'fill-opacity': 0.03 },
      layout: { 'visibility': $toggleUtm.checked ? 'visible' : 'none' },
    }, labelLayer);

    // === Chunk grid ===
    const cs = store.chunkShape;
    const s = store.shape;
    const nRows = Math.ceil(s[0] / cs[0]);
    const nCols = Math.ceil(s[1] / cs[1]);

    const features = [];
    for (let ci = 0; ci < nRows; ci++) {
      for (let cj = 0; cj < nCols; cj++) {
        const hasData = store.chunkManifest ? store.chunkManifest.has(`${ci}_${cj}`) : true;
        const corners = getChunkLngLatCorners(ci, cj);
        features.push({
          type: 'Feature',
          properties: { ci, cj, hasData, label: `${ci},${cj}` },
          geometry: {
            type: 'Polygon',
            coordinates: [[corners[0], corners[1], corners[2], corners[3], corners[0]]]
          }
        });
      }
    }

    map.addSource('chunk-grid', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features }
    });

    const gridVis = $toggleGrid.checked ? 'visible' : 'none';

    // No-data fill (dim)
    map.addLayer({
      id: 'chunk-grid-nodata',
      type: 'fill',
      source: 'chunk-grid',
      filter: ['==', ['get', 'hasData'], false],
      paint: { 'fill-color': '#374151', 'fill-opacity': 0.15 },
      layout: { 'visibility': gridVis },
    }, labelLayer);

    // Data fill (very subtle cyan)
    map.addLayer({
      id: 'chunk-grid-data',
      type: 'fill',
      source: 'chunk-grid',
      filter: ['==', ['get', 'hasData'], true],
      paint: { 'fill-color': '#00e5ff', 'fill-opacity': 0.04 },
      layout: { 'visibility': gridVis },
    }, labelLayer);

    // Grid lines (cyan for data, gray for nodata)
    map.addLayer({
      id: 'chunk-grid-lines',
      type: 'line',
      source: 'chunk-grid',
      paint: {
        'line-color': ['case', ['get', 'hasData'], '#00e5ff', '#374151'],
        'line-width': ['case', ['get', 'hasData'], 1, 0.5],
        'line-opacity': ['case', ['get', 'hasData'], 0.4, 0.2],
      },
      layout: { 'visibility': gridVis },
    }, labelLayer);

    // UTM zone outline (on top of grid, always visible)
    map.addLayer({
      id: 'utm-zone-line',
      type: 'line',
      source: 'utm-zone',
      paint: {
        'line-color': '#39ff14',
        'line-width': 2,
        'line-opacity': 0.5,
        'line-dasharray': [6, 4],
      },
      layout: { 'visibility': $toggleUtm.checked ? 'visible' : 'none' },
    }, labelLayer);

  }

  // ─── Chunk loading ────────────────────────────────────────────

  function rgbaToCanvas(rgbaBuffer, w, h) {
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(w, h);
    img.data.set(new Uint8Array(rgbaBuffer));
    ctx.putImageData(img, 0, 0);
    return canvas;
  }

  async function loadChunk(ci, cj, signal) {
    const key = chunkKey(ci, cj);
    if (chunkCache.has(key) && chunkCache.get(key).embRaw) return;

    loadingChunks++;
    showChunkLoading(`Fetching chunk (${ci}, ${cj})...`);

    try {
      // Fetch compressed embeddings and scales in parallel
      const [compEmb, compScales] = await Promise.all([
        fetchCompressedChunk(store.url, 'embeddings', [ci, cj, 0], signal),
        fetchCompressedChunk(store.url, 'scales', [ci, cj], signal),
      ]);

      if (!compEmb || !compScales) {
        chunkCache.set(key, { embRaw: null, scalesRaw: null, canvas: null, sourceId: null, layerId: null });
        return;
      }

      const { r0, r1, c0, c1 } = getChunkPixelBounds(ci, cj);
      const h = r1 - r0;
      const w = c1 - c0;

      // Dispatch decompression + rendering to worker
      const result = await workerPool.dispatch({
        type: 'decompress-and-render-emb',
        compressedEmb: compEmb.buffer,
        compressedScales: compScales.buffer,
        width: w, height: h,
        strideCol: store.chunkShape[1],
        nBands: store.chunkShape[2],
        bands,
      }, [compEmb.buffer, compScales.buffer]);

      // Reconstruct Uint8Array views from transferred buffers
      const embRaw = new Uint8Array(result.embRaw);
      const scalesRaw = new Uint8Array(result.scalesRaw);

      let canvas = null, sourceId = null, layerId = null;
      if (result.nValid > 0) {
        canvas = rgbaToCanvas(result.rgba, w, h);
        ({ sourceId, layerId } = addChunkToMap(ci, cj, canvas));
        console.log(`[render] chunk (${ci},${cj}) → ${w}x${h}px, layer=${layerId}`);

        if (autoZoomNext) {
          autoZoomNext = false;
          const corners = getChunkLngLatCorners(ci, cj);
          const lngs = corners.map(c => c[0]);
          const lats = corners.map(c => c[1]);
          map.fitBounds([
            [Math.min(...lngs), Math.min(...lats)],
            [Math.max(...lngs), Math.max(...lats)],
          ], { padding: 40, duration: 1000 });
          console.log(`[zoom] auto-zoomed to chunk (${ci},${cj})`);
        }
      } else {
        console.log(`[render] chunk (${ci},${cj}) → no valid pixels, skipped`);
      }

      chunkCache.set(key, { embRaw, scalesRaw, canvas, sourceId, layerId });
      totalLoaded++;
      updateInfoPanel();
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.warn(`Failed to load chunk (${ci},${cj}):`, err);
      chunkCache.set(key, { embRaw: null, scalesRaw: null, canvas: null, sourceId: null, layerId: null });
    } finally {
      loadingChunks--;
      progressTracker.tick();
      if (loadingChunks <= 0) hideChunkLoading();
    }
  }

  // ─── RGB preview chunk loading ─────────────────────────────────

  async function loadPreviewChunk(ci, cj, signal) {
    const key = chunkKey(ci, cj);
    if (chunkCache.has(key)) return;  // already loaded (preview or full)

    loadingChunks++;
    showChunkLoading(`Preview (${ci}, ${cj})...`);

    try {
      const compRgb = await fetchCompressedChunk(store.url, 'rgb', [ci, cj, 0], signal);
      if (!compRgb) {
        chunkCache.set(key, { embRaw: null, scalesRaw: null, canvas: null, sourceId: null, layerId: null, isPreview: true });
        return;
      }

      const { r0, r1, c0, c1 } = getChunkPixelBounds(ci, cj);
      const h = r1 - r0;
      const w = c1 - c0;

      const result = await workerPool.dispatch({
        type: 'decompress-and-render-rgb',
        compressedRgb: compRgb.buffer,
        width: w, height: h,
        strideCol: rgbMeta.chunkShape[1],
      }, [compRgb.buffer]);

      let canvas = null, sourceId = null, layerId = null;
      if (result.nValid > 0) {
        canvas = rgbaToCanvas(result.rgba, w, h);
        ({ sourceId, layerId } = addChunkToMap(ci, cj, canvas));
        console.log(`[rgb] chunk (${ci},${cj}) → ${w}x${h}px preview`);

        if (autoZoomNext) {
          autoZoomNext = false;
          const corners = getChunkLngLatCorners(ci, cj);
          const lngs = corners.map(c => c[0]);
          const lats = corners.map(c => c[1]);
          map.fitBounds([
            [Math.min(...lngs), Math.min(...lats)],
            [Math.max(...lngs), Math.max(...lats)],
          ], { padding: 40, duration: 1000 });
        }
      }

      chunkCache.set(key, { embRaw: null, scalesRaw: null, canvas, sourceId, layerId, isPreview: true });
      totalLoaded++;
      updateInfoPanel();
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.warn(`Failed to load preview chunk (${ci},${cj}):`, err);
      chunkCache.set(key, { embRaw: null, scalesRaw: null, canvas: null, sourceId: null, layerId: null, isPreview: true });
    } finally {
      loadingChunks--;
      progressTracker.tick();
      if (loadingChunks <= 0) hideChunkLoading();
    }
  }

  async function loadFullChunk(ci, cj, signal) {
    const key = chunkKey(ci, cj);
    const existing = chunkCache.get(key);
    if (existing?.embRaw) return;  // already have full data

    loadingChunks++;
    showChunkLoading(`Full bands (${ci}, ${cj})...`);

    try {
      const [compEmb, compScales] = await Promise.all([
        fetchCompressedChunk(store.url, 'embeddings', [ci, cj, 0], signal),
        fetchCompressedChunk(store.url, 'scales', [ci, cj], signal),
      ]);

      if (!compEmb || !compScales) return;

      // Remove old preview from map
      if (existing?.sourceId) removeChunkFromMap(key);

      const { r0, r1, c0, c1 } = getChunkPixelBounds(ci, cj);
      const h = r1 - r0;
      const w = c1 - c0;

      const result = await workerPool.dispatch({
        type: 'decompress-and-render-emb',
        compressedEmb: compEmb.buffer,
        compressedScales: compScales.buffer,
        width: w, height: h,
        strideCol: store.chunkShape[1],
        nBands: store.chunkShape[2],
        bands,
      }, [compEmb.buffer, compScales.buffer]);

      const embRaw = new Uint8Array(result.embRaw);
      const scalesRaw = new Uint8Array(result.scalesRaw);

      let canvas = null, sourceId = null, layerId = null;
      if (result.nValid > 0) {
        canvas = rgbaToCanvas(result.rgba, w, h);
        ({ sourceId, layerId } = addChunkToMap(ci, cj, canvas));
        console.log(`[full] chunk (${ci},${cj}) → ${w}x${h}px custom bands`);
      }

      chunkCache.set(key, { embRaw, scalesRaw, canvas, sourceId, layerId, isPreview: false });
      clickedChunks.add(key);
      $bandPanel.classList.remove('opacity-40', 'pointer-events-none');
      updateInfoPanel();
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.warn(`Failed to load full chunk (${ci},${cj}):`, err);
    } finally {
      loadingChunks--;
      progressTracker.tick();
      if (loadingChunks <= 0) hideChunkLoading();
    }
  }

  // ─── View update ──────────────────────────────────────────────

  async function updateVisibleChunks() {
    if (!store) return;
    currentAbort?.abort();                       // cancel in-flight fetches
    progressTracker.reset();
    const abort = currentAbort = new AbortController();
    const signal = abort.signal;

    const visible = getVisibleChunkIndices();
    const visibleKeys = new Set(visible.map(([ci, cj]) => chunkKey(ci, cj)));
    const bounds = map.getBounds();
    console.log(`[viewport] zoom=${map.getZoom().toFixed(1)} bounds=[${bounds.getWest().toFixed(3)},${bounds.getSouth().toFixed(3)}]-[${bounds.getEast().toFixed(3)},${bounds.getNorth().toFixed(3)}] visible_chunks=${visible.length}`);

    // Remove off-screen chunks from map (keep in cache)
    for (const [key, entry] of chunkCache) {
      if (!visibleKeys.has(key) && entry.sourceId) {
        removeChunkFromMap(key);
      }
    }

    // Load new visible chunks (parallel, up to 4 at a time)
    const toLoad = [];
    for (const [ci, cj] of visible) {
      const key = chunkKey(ci, cj);
      const entry = chunkCache.get(key);

      if (entry?.canvas && !entry.sourceId) {
        // Already in cache (preview or full), just re-add to map
        const ids = addChunkToMap(ci, cj, entry.canvas);
        entry.sourceId = ids.sourceId;
        entry.layerId = ids.layerId;
      } else if (!entry) {
        toLoad.push([ci, cj]);
      }
    }

    // Sort by distance from viewport center so nearest chunks render first
    try {
      const center = map.getCenter();
      const [cE, cN] = projForward(center.lng, center.lat);
      toLoad.sort((a, b) => {
        const ba = getChunkUtmBounds(a[0], a[1]);
        const bb = getChunkUtmBounds(b[0], b[1]);
        const da = Math.hypot((ba.minE + ba.maxE) / 2 - cE, (ba.minN + ba.maxN) / 2 - cN);
        const db = Math.hypot((bb.minE + bb.maxE) / 2 - cE, (bb.minN + bb.maxN) / 2 - cN);
        return da - db;
      });
    } catch { /* projection error, keep original order */ }

    // Cap chunks to avoid loading thousands when zoomed out
    if (toLoad.length > MAX_LOAD_PER_UPDATE) {
      console.log(`[fetch] capping ${toLoad.length} → ${MAX_LOAD_PER_UPDATE} chunks (zoom in for full coverage)`);
      setStatus(`Loading nearest ${MAX_LOAD_PER_UPDATE} of ${toLoad.length} chunks — zoom in`, 'text-yellow-400');
      toLoad.length = MAX_LOAD_PER_UPDATE;
    }

    // Load chunks with concurrency limit, aborting if viewport changes
    // Route to preview or full depending on RGB availability
    progressTracker.start(toLoad.length);
    if (toLoad.length > 0) {
      console.log(`[fetch] loading ${toLoad.length} chunks (${hasRgbPreview ? 'rgb preview' : 'full'}): ${toLoad.slice(0, 20).map(([ci,cj]) => `(${ci},${cj})`).join(' ')}${toLoad.length > 20 ? ' ...' : ''}`);
    }
    const CONCURRENCY = 4;
    for (let i = 0; i < toLoad.length; i += CONCURRENCY) {
      if (signal.aborted) {
        console.log(`[fetch] cancelled: viewport changed (loaded ${i}/${toLoad.length})`);
        break;
      }
      const batch = toLoad.slice(i, i + CONCURRENCY);
      await Promise.all(batch.map(([ci, cj]) => {
        if (hasRgbPreview && !clickedChunks.has(chunkKey(ci, cj))) {
          return loadPreviewChunk(ci, cj, signal);
        }
        return loadChunk(ci, cj, signal);
      }));
    }

    // Evict oldest cache entries if over limit, but not visible ones
    if (chunkCache.size > MAX_CACHED) {
      const keys = [...chunkCache.keys()];
      for (let i = 0; i < keys.length && chunkCache.size > MAX_CACHED; i++) {
        if (!visibleKeys.has(keys[i])) {
          removeChunkFromMap(keys[i]);
          chunkCache.delete(keys[i]);
        }
      }
    }
  }

  // ─── Re-render on band change ─────────────────────────────────

  async function reRenderAllChunks() {
    const tasks = [];
    for (const [key, entry] of chunkCache) {
      if (!entry.embRaw) continue;  // skip preview-only chunks
      const [ci, cj] = key.split('_').map(Number);
      const wasOnMap = !!entry.sourceId;
      if (wasOnMap) removeChunkFromMap(key);

      const { r0, r1, c0, c1 } = getChunkPixelBounds(ci, cj);
      const h = r1 - r0;
      const w = c1 - c0;

      // Send already-decompressed data for re-render with new bands
      const embCopy = entry.embRaw.slice().buffer;
      const scalesCopy = entry.scalesRaw.slice().buffer;
      const task = workerPool.dispatch({
        type: 'render-emb',
        embRaw: embCopy,
        scalesRaw: scalesCopy,
        width: w, height: h,
        strideCol: store.chunkShape[1],
        nBands: store.chunkShape[2],
        bands,
      }, [embCopy, scalesCopy]).then(result => {
        // Recover decompressed bytes (not transferred for render-emb since we made copies)
        entry.embRaw = new Uint8Array(result.embRaw);
        entry.scalesRaw = new Uint8Array(result.scalesRaw);
        if (result.nValid > 0) {
          entry.canvas = rgbaToCanvas(result.rgba, w, h);
          if (wasOnMap) {
            const ids = addChunkToMap(ci, cj, entry.canvas);
            entry.sourceId = ids.sourceId;
            entry.layerId = ids.layerId;
          }
        } else {
          entry.canvas = null;
        }
      });
      tasks.push(task);
    }
    await Promise.all(tasks);
  }

  // ─── Opacity update ───────────────────────────────────────────

  function updateAllOpacity() {
    for (const [, entry] of chunkCache) {
      if (entry.layerId && map.getLayer(entry.layerId)) {
        map.setPaintProperty(entry.layerId, 'raster-opacity', opacity);
      }
    }
  }

  // ─── Store loading ────────────────────────────────────────────

  function resolveStoreUrl(name) {
    // Use relative URL so all fetches are same-origin
    const base = window.location.pathname.replace(/[^/]*$/, '');
    return base + name;
  }

  async function doLoadStore() {
    // Prefer manual URL if filled in, otherwise use dropdown selection
    const manual = $storeUrl.value.trim().replace(/\/+$/, '');
    const selected = $storeSelect.value;
    const url = manual || (selected ? resolveStoreUrl(selected) : '');
    if (!url) return;

    setStatus('Connecting...', 'text-term-cyan');
    $loadBtn.disabled = true;
    $loadBtn.textContent = '...';

    try {
      // Clear previous state
      for (const [key] of chunkCache) removeChunkFromMap(key);
      chunkCache.clear();
      removeOverlays();
      totalLoaded = 0;
      autoZoomNext = true;
      store = null;
      hasRgbPreview = false;
      rgbMeta = null;
      clickedChunks.clear();

      // Read metadata
      setStatus('Reading metadata...', 'text-term-cyan');
      const groupMeta = await readStoreMeta(url);
      const embMeta = await readArrayMeta(url, 'embeddings');
      const scalesMeta = await readArrayMeta(url, 'scales');

      const utmZone = groupMeta.utm_zone;
      const epsg = groupMeta.crs_epsg;
      const transform = groupMeta.transform;

      if (!utmZone || !transform || !embMeta.shape) {
        throw new Error('Missing required store metadata (utm_zone, transform, shape)');
      }

      // Try to detect RGB preview array
      try {
        rgbMeta = await readArrayMeta(url, 'rgb');
        hasRgbPreview = true;
        setStatus('RGB preview detected', 'text-term-cyan');
      } catch {
        hasRgbPreview = false;
        rgbMeta = null;
      }

      // Load chunk manifest (generated by serve command) to avoid 404s on sparse stores
      let chunkManifest = null;
      try {
        const manifestData = await fetchJSON(`${url}/_chunk_manifest.json`);
        if (manifestData?.chunks) {
          chunkManifest = new Set(manifestData.chunks.map(([ci, cj]) => `${ci}_${cj}`));
          setStatus(`Manifest: ${chunkManifest.size} chunks`, 'text-term-cyan');
        }
        // Also check manifest for has_rgb
        if (manifestData?.has_rgb !== undefined) {
          hasRgbPreview = manifestData.has_rgb;
          if (hasRgbPreview && !rgbMeta) {
            try { rgbMeta = await readArrayMeta(url, 'rgb'); } catch { hasRgbPreview = false; }
          }
        }
      } catch {
        // No manifest available - will request all grid positions
      }

      const isSouth = epsg >= 32700 && epsg <= 32760;
      setupProjection(utmZone, isSouth);

      store = {
        url, groupMeta, embMeta, scalesMeta,
        utmZone, epsg, transform,
        shape: embMeta.shape,
        chunkShape: embMeta.chunkShape,
        chunkManifest,
      };

      // Update info panel
      $infoPanel.classList.remove('hidden');
      $infoZone.textContent = utmZone;
      $infoEpsg.textContent = `EPSG:${epsg}`;
      const pxSize = transform[0];
      $infoGrid.textContent = `${store.shape[1]}x${store.shape[0]}px (${(store.shape[1]*pxSize/1000).toFixed(0)}x${(store.shape[0]*pxSize/1000).toFixed(0)}km)`;
      updateInfoPanel();

      // Enable controls
      if (hasRgbPreview) {
        // Band panel stays dimmed until user clicks a tile for full data
        $bandPanel.classList.add('opacity-40', 'pointer-events-none');
      } else {
        $bandPanel.classList.remove('opacity-40', 'pointer-events-none');
      }
      $opacityPanel.classList.remove('opacity-40', 'pointer-events-none');
      $overlayPanel.classList.remove('opacity-40', 'pointer-events-none');

      // Add overlays (chunk grid + UTM zone boundary)
      addOverlays();

      // Fly to store bounds
      const px = transform[0];
      const originE = transform[2];
      const originN = transform[5];
      const w = store.shape[1];
      const h = store.shape[0];

      const corners = [
        utmToLngLat(originE, originN),
        utmToLngLat(originE + w * px, originN),
        utmToLngLat(originE + w * px, originN - h * px),
        utmToLngLat(originE, originN - h * px),
      ];

      const lngs = corners.map(c => c[0]);
      const lats = corners.map(c => c[1]);

      map.fitBounds([
        [Math.min(...lngs), Math.min(...lats)],
        [Math.max(...lngs), Math.max(...lats)],
      ], { padding: 40, duration: 1500 });

      const rgbLabel = hasRgbPreview ? ' +rgb' : '';
      setStatus(`Loaded: zone ${utmZone}${rgbLabel}`, 'text-term-green');

      // Start loading visible chunks after fly animation
      setTimeout(() => updateVisibleChunks(), 1800);

    } catch (err) {
      console.error('Store load failed:', err);
      setStatus(`Error: ${err.message}`, 'text-red-400');
    } finally {
      $loadBtn.disabled = false;
      $loadBtn.textContent = 'LOAD';
    }
  }

  // ─── UI helpers ───────────────────────────────────────────────

  function setStatus(msg, cls) {
    $status.textContent = msg;
    $status.className = `mt-1.5 text-[10px] truncate ${cls || 'text-gray-600'}`;
  }

  function showChunkLoading(msg) {
    $chunkLoadingText.textContent = msg;
    $chunkLoading.classList.remove('hidden');
  }

  function hideChunkLoading() {
    $chunkLoading.classList.add('hidden');
  }

  function updateInfoPanel() {
    if (!store) return;
    const nChunksRow = Math.ceil(store.shape[0] / store.chunkShape[0]);
    const nChunksCol = Math.ceil(store.shape[1] / store.chunkShape[1]);
    const total = nChunksRow * nChunksCol;
    if (hasRgbPreview) {
      $infoChunks.textContent = `${totalLoaded} / ${total} (${clickedChunks.size} inspected)`;
    } else {
      $infoChunks.textContent = `${totalLoaded} / ${total}`;
    }
    let statusText = loadingChunks > 0 ? `loading ${loadingChunks}...` : 'idle';
    if (hasRgbPreview && loadingChunks === 0) statusText = 'rgb preview — click to inspect';
    $infoStatus.textContent = statusText;
  }

  // ─── Event setup ──────────────────────────────────────────────

  function setupControls() {
    $loadBtn.addEventListener('click', doLoadStore);
    $storeUrl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLoadStore(); });
    $storeSelect.addEventListener('change', doLoadStore);

    // Band sliders
    function onBandChange() {
      bands = [+$bandR.value, +$bandG.value, +$bandB.value];
      $bandRVal.textContent = bands[0];
      $bandGVal.textContent = bands[1];
      $bandBVal.textContent = bands[2];
    }

    let bandDebounce;
    function onBandChangeDebounced() {
      onBandChange();
      clearTimeout(bandDebounce);
      bandDebounce = setTimeout(() => reRenderAllChunks(), 150);
    }

    $bandR.addEventListener('input', onBandChangeDebounced);
    $bandG.addEventListener('input', onBandChangeDebounced);
    $bandB.addEventListener('input', onBandChangeDebounced);

    // Opacity
    $opacity.addEventListener('input', () => {
      opacity = +$opacity.value / 100;
      $opacityVal.textContent = opacity.toFixed(2);
      updateAllOpacity();
    });

    // Overlay toggles
    $toggleGrid.addEventListener('change', () => {
      const vis = $toggleGrid.checked ? 'visible' : 'none';
      for (const id of ['chunk-grid-nodata', 'chunk-grid-data', 'chunk-grid-lines']) {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
      }
    });

    $toggleUtm.addEventListener('change', () => {
      const vis = $toggleUtm.checked ? 'visible' : 'none';
      for (const id of ['utm-zone-fill', 'utm-zone-line']) {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
      }
    });
  }

  // ─── Map init ─────────────────────────────────────────────────

  function initMap() {
    map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'carto-dark': {
            type: 'raster',
            tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
            tileSize: 256,
            attribution: '&copy; <a href="https://carto.com">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
          },
        },
        layers: [{
          id: 'carto-dark-layer',
          type: 'raster',
          source: 'carto-dark',
          minzoom: 0,
          maxzoom: 20,
        }],
        // No glyphs needed - basemap labels come from raster tiles
      },
      center: [10, 60],
      zoom: 4,
      maxZoom: 18,
      hash: true,
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

    // Coordinate display on mouse move
    map.on('mousemove', (e) => {
      const { lng, lat } = e.lngLat;
      let text = `${Math.abs(lat).toFixed(5)}°${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lng).toFixed(5)}°${lng >= 0 ? 'E' : 'W'}`;
      if (store && projForward) {
        try {
          const [easting, northing] = projForward(lng, lat);
          text += ` | ${easting.toFixed(0)}E ${northing.toFixed(0)}N`;
        } catch { /* outside projection bounds */ }
      }
      $coordText.textContent = text;
    });

    // Update chunks on move (moveend fires for both pan and zoom)
    let moveDebounce;
    map.on('moveend', () => {
      clearTimeout(moveDebounce);
      moveDebounce = setTimeout(() => updateVisibleChunks(), 300);
    });

    // Click to inspect: load full 128-band data for a chunk
    map.on('click', (e) => {
      if (!store || !hasRgbPreview || !projForward) return;
      try {
        const [easting, northing] = projForward(e.lngLat.lng, e.lngLat.lat);
        const t = store.transform;
        const px = t[0];
        const originE = t[2];
        const originN = t[5];
        const cs = store.chunkShape;

        const col = Math.floor((easting - originE) / px);
        const row = Math.floor((originN - northing) / px);
        if (col < 0 || row < 0 || col >= store.shape[1] || row >= store.shape[0]) return;

        const ci = Math.floor(row / cs[0]);
        const cj = Math.floor(col / cs[1]);
        const key = chunkKey(ci, cj);

        if (clickedChunks.has(key)) return;
        if (store.chunkManifest && !store.chunkManifest.has(key)) return;

        console.log(`[click] inspect chunk (${ci},${cj})`);
        loadFullChunk(ci, cj);
      } catch { /* outside projection bounds */ }
    });

    // Discover available stores and handle URL params
    map.once('load', async () => {
      const params = new URLSearchParams(window.location.search);
      const storeParam = params.get('store');

      // Try to fetch store manifest from the server (relative URL = same-origin)
      try {
        const base = window.location.pathname.replace(/[^/]*$/, '');
        const resp = await fetch(base + '_stores.json');
        if (resp.ok) {
          const stores = await resp.json();
          $storeSelect.innerHTML = '';
          if (stores.length === 0) {
            $storeSelect.innerHTML = '<option value="" disabled selected>No stores found</option>';
          } else {
            for (const name of stores) {
              const opt = document.createElement('option');
              opt.value = name;
              opt.textContent = name;
              $storeSelect.appendChild(opt);
            }
            // Auto-select from URL param or first store
            if (storeParam) {
              // If param is a full URL, extract just the store name
              const storeName = storeParam.split('/').pop();
              const match = stores.find(s => s === storeName);
              if (match) $storeSelect.value = match;
              else $storeUrl.value = storeParam;
            } else {
              $storeSelect.value = stores[0];
            }
            // Auto-load the selected store
            setTimeout(doLoadStore, 300);
          }
        } else {
          throw new Error('no manifest');
        }
      } catch {
        // No manifest available - use manual URL mode
        $storeSelect.innerHTML = '<option value="" disabled selected>Enter URL below</option>';
        if (storeParam) {
          $storeUrl.value = storeParam;
          $storeUrl.parentElement.parentElement.open = true;  // expand details
          setTimeout(doLoadStore, 300);
        }
      }
    });
  }

  // ─── Init ─────────────────────────────────────────────────────

  initMap();
  setupControls();

  </script>
</body>
</html>
